name: Test Hardware Interface

on:
  push:
    branches: [main]

jobs:
  test-hardware-interface:
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v7.0.0
      with:
        fetch-depth: 0
    - name: Assert and release reset
      run: |
        romulan src/rom.s --build --upload -v
        romulan hardware capture --max-cycles 500
